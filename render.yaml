services:
  - type: web
    name: mealplanner-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://mealplanner-backend.onrender.com/api

  - type: web
    name: mealplanner-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --prefix server && npm run build --prefix server
    startCommand: npm start --prefix server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mealplanner-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://mealplanner-frontend.onrender.com
      - key: APP_URL
        value: https://mealplanner-frontend.onrender.com
      - key: RESEND_API_KEY
        value: ""
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev

databases:
  - name: mealplanner-db
    databaseName: mealplanner
    user: mealplanner
    plan: free
